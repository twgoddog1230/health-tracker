<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康全記錄</title>
<meta name="description" content="記錄每日體重、體脂肪、步數、超慢跑時間，追蹤健康趨勢">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080d1a;--card:rgba(255,255,255,.06);--card2:rgba(255,255,255,.03);
  --border:rgba(255,255,255,.1);--accent:#00c9a7;--accent2:#00b4d8;
  --red:#ff6b6b;--yellow:#ffd93d;--text:#e8eaf0;--muted:#8892a4;
  --radius:16px;--shadow:0 8px 32px rgba(0,0,0,.4);
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 20%,rgba(0,201,167,.08) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 80%,rgba(0,180,216,.08) 0%,transparent 50%)}
a{color:inherit;text-decoration:none}
/* HEADER */
header{padding:24px 24px 0;max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo span{font-size:.85rem;font-weight:400;-webkit-text-fill-color:var(--muted);margin-left:8px}
.header-btns{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:1px solid var(--border);
  background:var(--card);color:var(--text);font-family:inherit;font-size:.85rem;cursor:pointer;transition:.2s}
.btn:hover{background:rgba(255,255,255,.1);border-color:var(--accent);color:var(--accent)}
.btn-accent{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#000;font-weight:600}
.btn-accent:hover{opacity:.85;color:#000}
/* MAIN */
main{max-width:1100px;margin:0 auto;padding:24px}
.grid{display:grid;gap:20px}
.grid-stats{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);backdrop-filter:blur(12px)}
.card-title{font-size:1rem;font-weight:600;color:var(--accent);margin-bottom:18px;display:flex;align-items:center;gap:8px}
/* STAT CARD */
.stat-card{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center;
  transition:.2s;cursor:pointer;user-select:none}
.stat-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.stat-card.active{border-color:var(--accent);background:rgba(0,201,167,.12);
  transform:translateY(-2px);box-shadow:0 0 0 2px rgba(0,201,167,.25)}
.stat-icon{font-size:1.8rem;margin-bottom:8px}
.stat-val{font-size:1.6rem;font-weight:700;color:var(--text)}
.stat-unit{font-size:.8rem;color:var(--muted);margin-left:2px}
.stat-label{font-size:.8rem;color:var(--muted);margin-top:4px}
/* FORM */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
label{font-size:.82rem;color:var(--muted);font-weight:500}
input[type=text],input[type=number],input[type=date]{
  background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;color:var(--text);font-family:inherit;font-size:.95rem;outline:none;transition:.2s;width:100%}
input:focus{border-color:var(--accent);background:rgba(0,201,167,.08);box-shadow:0 0 0 3px rgba(0,201,167,.15)}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.6)}
.form-actions{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
/* CHART RANGE */
.range-btns{display:flex;gap:6px;margin-bottom:16px}
.range-btn{padding:5px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;
  color:var(--muted);font-family:inherit;font-size:.82rem;cursor:pointer;transition:.2s}
.range-btn.active,.range-btn:hover{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
/* TABLE */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{text-align:left;padding:10px 12px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.03)}
tr.row-empty td{color:var(--muted)}
tr.row-empty:hover td{background:rgba(255,255,255,.02);cursor:pointer}
.del-btn{background:none;border:1px solid rgba(255,107,107,.3);border-radius:6px;color:var(--red);
  padding:4px 10px;cursor:pointer;font-size:.8rem;transition:.2s}
.del-btn:hover{background:rgba(255,107,107,.15)}
.empty{text-align:center;color:var(--muted);padding:32px;font-size:.9rem}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--accent);color:#000;padding:10px 22px;border-radius:10px;
  font-weight:600;font-size:.9rem;z-index:999;transition:.3s;pointer-events:none;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
/* scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
/* period toggle */
.period-field{display:flex;align-items:center;gap:10px;padding:12px 14px;
  background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:.2s}
.period-field:hover{border-color:var(--accent)}
.period-field input[type=checkbox]{width:18px;height:18px;accent-color:#ff6b8a;cursor:pointer;flex-shrink:0}
.period-field label{font-size:.88rem;color:var(--muted);font-weight:500;cursor:pointer;line-height:1}
.period-field.checked{border-color:#ff6b8a;background:rgba(255,107,138,.08)}
.period-field.checked label{color:#ff6b8a}
</style>
</head>
<body>
<header>
  <div>
    <div class="logo">🏃 健康全記錄<span id="todayLabel"></span></div>
  </div>
  <div class="header-btns">
    <button class="btn" onclick="importData()">📂 匯入</button>
    <button class="btn" onclick="exportData()">💾 匯出</button>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleImport(event)">
  </div>
</header>

<main>
  <!-- STATS -->
  <div class="grid grid-stats" id="statsRow" style="margin-bottom:0">
    <div class="stat-card" onclick="selectMetric('weight',this)">
      <div class="stat-icon">⚖️</div><div class="stat-val" id="s-weight">--<span class="stat-unit">kg</span></div><div class="stat-label">近7天平均體重</div>
    </div>
    <div class="stat-card" onclick="selectMetric('fat',this)">
      <div class="stat-icon">📊</div><div class="stat-val" id="s-fat">--<span class="stat-unit">%</span></div><div class="stat-label">最新體脂肪</div>
    </div>
    <div class="stat-card" onclick="selectMetric('muscle',this)">
      <div class="stat-icon">💪</div><div class="stat-val" id="s-muscle">--<span class="stat-unit">kg</span></div><div class="stat-label">最新肌肉量</div>
    </div>
    <div class="stat-card" onclick="selectMetric('bp',this)">
      <div class="stat-icon">🩺</div><div class="stat-val" id="s-bp">--</div><div class="stat-label">最新血壓</div>
    </div>
    <div class="stat-card" onclick="selectMetric('steps',this)">
      <div class="stat-icon">👟</div><div class="stat-val" id="s-steps">--</div><div class="stat-label">累計步數</div>
    </div>
    <div class="stat-card" onclick="selectMetric('jog',this)">
      <div class="stat-icon">🏃</div><div class="stat-val" id="s-jog">--</div><div class="stat-label">超慢跑累計</div>
    </div>
  </div>

  <!-- FORM (full width) -->
  <div class="card" style="margin-top:20px">
    <div class="card-title">📥 今日記錄</div>
    <div class="form-grid">
      <div class="field"><label for="f-date">日期</label><input type="date" id="f-date"></div>
      <div class="field"><label for="f-weight">體重（kg）</label><input type="number" id="f-weight" placeholder="例：70.5" step="0.1" min="20" max="300"></div>
      <div class="field"><label for="f-fat">體脂肪（%）</label><input type="number" id="f-fat" placeholder="例：18.5" step="0.1" min="1" max="70"></div>
      <div class="field"><label for="f-muscle">肌肉量（kg）</label><input type="number" id="f-muscle" placeholder="例：28.0" step="0.1" min="0" max="100"></div>
      <div class="field"><label for="f-bp-sys">血壓高（收縮壓）</label><input type="number" id="f-bp-sys" placeholder="例：120" step="1" min="50" max="250"></div>
      <div class="field"><label for="f-bp-dia">血壓低（舒張壓）</label><input type="number" id="f-bp-dia" placeholder="例：80" step="1" min="30" max="150"></div>
      <div class="field"><label for="f-steps">步數</label><input type="number" id="f-steps" placeholder="例：8000" step="1" min="0"></div>
      <div class="field"><label for="f-jog">超慢跑（分鐘）</label><input type="number" id="f-jog" placeholder="例：30" step="1" min="0"></div>
      <div class="period-field" id="periodField" onclick="togglePeriod()">
        <input type="checkbox" id="f-period" onclick="event.stopPropagation();togglePeriod()">
        <label for="f-period">🩸 生理期（當天）</label>
      </div>
    </div>
    <div class="form-actions" style="margin-top:18px">
      <button class="btn btn-accent" onclick="saveRecord()">✓ 儲存記錄</button>
      <button class="btn" onclick="clearForm()">✕ 清除</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="card" style="margin-top:20px">
    <div class="card-title" style="justify-content:space-between">
      <span>📋 歷史紀錄</span>
      <button class="btn" style="font-size:.8rem;padding:5px 14px" onclick="toggleHistView()">
        <span id="histViewBtn">📊 圖表</span>
      </button>
    </div>
    <!-- filter row -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <div class="range-btns" style="margin-bottom:0">
        <button class="range-btn hist-btn active" onclick="setHistoryFilter('all',this)">全部</button>
        <button class="range-btn hist-btn" onclick="setHistoryFilter('month',this)">月</button>
        <button class="range-btn hist-btn" onclick="setHistoryFilter('week',this)">週</button>
      </div>
      <div id="histNav" style="display:none;align-items:center;gap:8px">
        <button class="btn" style="padding:5px 12px" onclick="shiftHistory(-1)">‹ 上一期</button>
        <span id="histLabel" style="color:var(--text);font-size:.9rem;min-width:130px;text-align:center;font-weight:500"></span>
        <button class="btn" id="histNextBtn" style="padding:5px 12px" onclick="shiftHistory(1)">下一期 ›</button>
      </div>
    </div>
    <!-- chart view -->
    <div id="histChartArea" style="display:none">
      <div id="metricChecks" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px"></div>
      <canvas id="histChart" height="260"></canvas>
    </div>
    <!-- table view -->
    <div id="histTblWrap" class="tbl-wrap">
      <table>
        <thead>
          <tr><th>日期</th><th>體重(kg)</th><th>體脂肪(%)</th><th>肌肉量(kg)</th><th>血壓</th><th>步數</th><th>超慢跑</th><th>生理期</th><th>操作</th></tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
      <div id="emptyMsg" class="empty" style="display:none">尚無記錄，請新增第一筆！</div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const KEY = 'healthRecords_v1';
let historyFilter  = 'all';
let historyOffset  = 0;
let histViewMode   = 'table';
let histChart      = null;
let histSelMetrics = new Set(['weight', 'fat']);

const HIST_METRICS = [
  {id:'weight', label:'體重',   key:'weight', color:'#00c9a7', type:'line', unit:'kg',   axis:'y'},
  {id:'fat',    label:'體脂肪', key:'fat',    color:'#00b4d8', type:'line', unit:'%',    axis:'y'},
  {id:'muscle', label:'肌肉量', key:'muscle', color:'#a78bfa', type:'line', unit:'kg',   axis:'y'},
  {id:'bpSys',  label:'收縮壓', key:'bpSys',  color:'#ff6b6b', type:'line', unit:'mmHg', axis:'y'},
  {id:'bpDia',  label:'舒張壓', key:'bpDia',  color:'#ff9f43', type:'line', unit:'mmHg', axis:'y'},
  {id:'steps',  label:'步數',   key:'steps',  color:'#ffd93d', type:'bar',  unit:'步',   axis:'y2'},
  {id:'jog',    label:'超慢跑', key:'jog',    color:'#4ecdc4', type:'bar',  unit:'分鐘', axis:'y2'},
];

const TOOLTIP_OPTS = {
  backgroundColor:'rgba(10,14,26,.95)', titleColor:'#00c9a7',
  bodyColor:'#e8eaf0', borderColor:'rgba(255,255,255,.1)', borderWidth:1, padding:12,
};
const SCALE_X = {ticks:{color:'#8892a4',font:{family:'Outfit',size:11}},grid:{color:'rgba(255,255,255,.05)'}};
const SCALE_Y = {ticks:{color:'#8892a4',font:{family:'Outfit',size:11}},grid:{color:'rgba(255,255,255,.05)'}};

// Marks period days with a pink background on the chart
const periodBgPlugin = {
  id: 'periodBg',
  beforeDatasetsDraw(chart) {
    const {ctx, chartArea, scales} = chart;
    if (!chartArea || !scales.x) return;
    const {top, bottom} = chartArea;
    const x = scales.x;
    const periodSet = new Set(getRecords().filter(r => r.period).map(r => r.date.slice(5)));
    chart.data.labels.forEach((lbl, i) => {
      if (!periodSet.has(lbl)) return;
      const left  = x.getPixelForValue(i - 0.5);
      const right = x.getPixelForValue(i + 0.5);
      ctx.save();
      ctx.fillStyle = 'rgba(255,107,138,0.13)';
      ctx.fillRect(left, top, right - left, bottom - top);
      ctx.restore();
    });
  }
};
Chart.register(periodBgPlugin);

// ─── Data ─────────────────────────────────────────────────

function getRecords() {
  try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch(e) { return []; }
}
function saveRecords(arr) { localStorage.setItem(KEY, JSON.stringify(arr)); }

function today() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function initDate() {
  document.getElementById('f-date').value = today();
  const d = new Date();
  document.getElementById('todayLabel').textContent =
    ' · '+d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
}

function fmtMinutes(mins) {
  if (!mins && mins !== 0) return '--';
  const h = Math.floor(mins/60), m = mins%60;
  if (h===0) return m+'分';
  if (m===0) return h+'時';
  return h+'時'+m+'分';
}

function toast(msg, isErr) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isErr ? 'var(--red)' : 'var(--accent)';
  el.style.color = isErr ? '#fff' : '#000';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}

// ─── Form ─────────────────────────────────────────────────

function togglePeriod() {
  const cb = document.getElementById('f-period');
  const field = document.getElementById('periodField');
  cb.checked = !cb.checked;
  field.classList.toggle('checked', cb.checked);
}

function saveRecord() {
  const date   = document.getElementById('f-date').value;
  const weight = document.getElementById('f-weight').value;
  const fat    = document.getElementById('f-fat').value;
  const muscle = document.getElementById('f-muscle').value;
  const bpSys  = document.getElementById('f-bp-sys').value;
  const bpDia  = document.getElementById('f-bp-dia').value;
  const steps  = document.getElementById('f-steps').value;
  const jogStr = document.getElementById('f-jog').value;
  const period = document.getElementById('f-period').checked;
  if (!date) { toast('請選擇日期', true); return; }
  const records = getRecords();
  const idx = records.findIndex(r => r.date === date);
  const entry = {
    date,
    weight: weight ? parseFloat(weight) : null,
    fat:    fat    ? parseFloat(fat)    : null,
    muscle: muscle ? parseFloat(muscle) : null,
    bpSys:  bpSys  ? parseInt(bpSys)   : null,
    bpDia:  bpDia  ? parseInt(bpDia)   : null,
    steps:  steps  ? parseInt(steps)   : null,
    jog:    jogStr ? parseInt(jogStr)  : 0,
    period,
  };
  if (idx >= 0) { records[idx] = entry; toast('記錄已更新！'); }
  else { records.push(entry); records.sort((a,b)=>a.date<b.date?-1:1); toast('記錄已儲存！'); }
  saveRecords(records);
  renderAll();
}

function clearForm() {
  document.getElementById('f-date').value = today();
  ['f-weight','f-fat','f-muscle','f-bp-sys','f-bp-dia','f-steps','f-jog'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-period').checked = false;
  document.getElementById('periodField').classList.remove('checked');
}

function deleteRecord(date) {
  if (!confirm('確定刪除 '+date+' 的記錄？')) return;
  saveRecords(getRecords().filter(r => r.date !== date));
  renderAll();
  toast('已刪除');
}

// ─── Stats ────────────────────────────────────────────────

function renderStats() {
  const records = getRecords();
  const rev = [...records].reverse();
  const last7 = records.filter(r=>r.weight).slice(-7);
  const avgW = last7.length ? (last7.reduce((s,r)=>s+r.weight,0)/last7.length).toFixed(1) : '--';
  document.getElementById('s-weight').innerHTML = avgW+'<span class="stat-unit">kg</span>';
  const lFat = rev.find(r=>r.fat!=null);
  document.getElementById('s-fat').innerHTML = (lFat?lFat.fat.toFixed(1):'--')+'<span class="stat-unit">%</span>';
  const lMus = rev.find(r=>r.muscle!=null);
  document.getElementById('s-muscle').innerHTML = (lMus?lMus.muscle.toFixed(1):'--')+'<span class="stat-unit">kg</span>';
  const lBP = rev.find(r=>r.bpSys!=null&&r.bpDia!=null);
  document.getElementById('s-bp').innerHTML = lBP ? lBP.bpSys+'<span class="stat-unit">/</span>'+lBP.bpDia : '--';
  const totalSteps = records.reduce((s,r)=>s+(r.steps||0),0);
  document.getElementById('s-steps').textContent = totalSteps>0 ? totalSteps.toLocaleString() : '--';
  const totalJog = records.reduce((s,r)=>s+(r.jog||0),0);
  document.getElementById('s-jog').textContent = totalJog>0 ? fmtMinutes(totalJog) : '--';
}

// ─── Stat card click → focus history chart ────────────────

function selectMetric(metric, el) {
  document.querySelectorAll('#statsRow .stat-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  // Map stat card metric to HIST_METRICS ids
  histSelMetrics = metric === 'bp'
    ? new Set(['bpSys', 'bpDia'])
    : new Set([metric]);
  // Switch to chart mode
  histViewMode = 'chart';
  document.getElementById('histViewBtn').textContent = '📋 表格';
  document.getElementById('histChartArea').style.display = 'block';
  document.getElementById('histTblWrap').style.display   = 'none';
  initMetricChecks();
  renderHistoryChart();
  document.querySelector('.card:last-child').scrollIntoView({behavior:'smooth', block:'start'});
}

// ─── History Filter ───────────────────────────────────────

function setHistoryFilter(f, btn) {
  historyFilter = f;
  historyOffset = 0;
  document.querySelectorAll('.hist-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('histNav').style.display = f==='all' ? 'none' : 'flex';
  renderHistory();
  if (histViewMode==='chart') renderHistoryChart();
}

function shiftHistory(dir) {
  if (dir > 0 && historyOffset >= 0) return;
  historyOffset += dir;
  renderHistory();
  if (histViewMode==='chart') renderHistoryChart();
}

// For 'month'/'week': fills ALL dates of the period; 'all': only dates with data.
function getFilteredRows() {
  const recordMap = Object.fromEntries(getRecords().map(r => [r.date, r]));
  if (historyFilter === 'all') return getRecords().slice().reverse();
  const now   = new Date();
  const dates = [];
  if (historyFilter === 'week') {
    const mon = new Date(now);
    const dow = mon.getDay();
    mon.setDate(mon.getDate() - (dow===0 ? 6 : dow-1) + historyOffset*7);
    mon.setHours(0,0,0,0);
    for (let i = 0; i < 7; i++) {
      const d = new Date(mon); d.setDate(d.getDate()+i);
      dates.push(d.toISOString().slice(0,10));
    }
  }
  if (historyFilter === 'month') {
    let y = now.getFullYear(), m = now.getMonth() + historyOffset;
    y += Math.floor(m/12); m = ((m%12)+12)%12;
    const days = new Date(y, m+1, 0).getDate();
    for (let d = 1; d <= days; d++)
      dates.push(y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'));
  }
  return dates.reverse().map(date => recordMap[date] ?? {date, _empty:true});
}

function getHistoryLabel() {
  const now = new Date();
  if (historyFilter === 'week') {
    const mon = new Date(now);
    const dow = mon.getDay();
    mon.setDate(mon.getDate() - (dow===0 ? 6 : dow-1) + historyOffset*7);
    const sun = new Date(mon); sun.setDate(sun.getDate()+6);
    const fmt = d => (d.getMonth()+1)+'/'+d.getDate();
    return fmt(mon)+' ~ '+fmt(sun);
  }
  if (historyFilter === 'month') {
    let y = now.getFullYear(), m = now.getMonth() + historyOffset;
    y += Math.floor(m/12); m = ((m%12)+12)%12;
    return y+'年'+(m+1)+'月';
  }
  return '';
}

// ─── History Table ────────────────────────────────────────

function renderHistory() {
  const rows  = getFilteredRows();
  const label = getHistoryLabel();
  if (label) {
    document.getElementById('histLabel').textContent = label;
    const nb = document.getElementById('histNextBtn');
    nb.disabled = historyOffset >= 0;
    nb.style.opacity = historyOffset >= 0 ? '.4' : '1';
    nb.style.cursor  = historyOffset >= 0 ? 'default' : 'pointer';
  }
  const tbody = document.getElementById('historyBody');
  const empty = document.getElementById('emptyMsg');
  if (!rows.length) { tbody.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';
  tbody.innerHTML = rows.map(r => {
    if (r._empty) {
      return `<tr class="row-empty" data-date="${r.date}">
        <td>${r.date}</td><td>--</td><td>--</td><td>--</td><td>--</td><td>--</td><td>--</td><td>--</td><td></td>
      </tr>`;
    }
    return `<tr>
      <td>${r.date}</td>
      <td>${r.weight!=null?r.weight.toFixed(1):'--'}</td>
      <td>${r.fat!=null?r.fat.toFixed(1):'--'}</td>
      <td>${r.muscle!=null?r.muscle.toFixed(1):'--'}</td>
      <td>${(r.bpSys!=null&&r.bpDia!=null)?r.bpSys+'/'+r.bpDia:'--'}</td>
      <td>${r.steps!=null?r.steps.toLocaleString():'--'}</td>
      <td>${r.jog?fmtMinutes(r.jog):'--'}</td>
      <td style="text-align:center">${r.period?'🩸':'--'}</td>
      <td><button class="del-btn" onclick="deleteRecord('${r.date}')">刪除</button></td>
    </tr>`;
  }).join('');
}

// Click row → fill form
document.addEventListener('click', function(e) {
  const tr = e.target.closest('tr');
  if (!tr || e.target.classList.contains('del-btn')) return;
  const date = tr.cells[0]?.textContent?.trim();
  if (!date || !/^\d{4}-\d{2}-\d{2}$/.test(date)) return;
  const r = getRecords().find(x => x.date===date);
  document.getElementById('f-date').value    = date;
  document.getElementById('f-weight').value  = r?.weight??'';
  document.getElementById('f-fat').value     = r?.fat??'';
  document.getElementById('f-muscle').value  = r?.muscle??'';
  document.getElementById('f-bp-sys').value  = r?.bpSys??'';
  document.getElementById('f-bp-dia').value  = r?.bpDia??'';
  document.getElementById('f-steps').value   = r?.steps??'';
  document.getElementById('f-jog').value     = r?.jog||'';
  document.getElementById('f-period').checked = !!r?.period;
  document.getElementById('periodField').classList.toggle('checked', !!r?.period);
  document.getElementById('f-date').scrollIntoView({behavior:'smooth', block:'center'});
});

// ─── History Chart ────────────────────────────────────────

function initMetricChecks() {
  const container = document.getElementById('metricChecks');
  container.innerHTML = '';
  HIST_METRICS.forEach(m => {
    const active = histSelMetrics.has(m.id);
    const lbl = document.createElement('label');
    lbl.style.cssText = `display:inline-flex;align-items:center;gap:6px;padding:5px 12px;
      border-radius:8px;border:1px solid ${active?m.color:'rgba(255,255,255,.1)'};
      color:${active?m.color:'#8892a4'};background:${active?m.color+'22':'transparent'};
      cursor:pointer;font-size:.82rem;transition:.2s;font-family:Outfit,sans-serif;`;
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = active;
    cb.style.cssText = `width:14px;height:14px;accent-color:${m.color};cursor:pointer;flex-shrink:0`;
    cb.addEventListener('change', () => {
      if (cb.checked) histSelMetrics.add(m.id); else histSelMetrics.delete(m.id);
      lbl.style.borderColor = cb.checked ? m.color : 'rgba(255,255,255,.1)';
      lbl.style.color       = cb.checked ? m.color : '#8892a4';
      lbl.style.background  = cb.checked ? m.color+'22' : 'transparent';
      renderHistoryChart();
    });
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(m.label));
    container.appendChild(lbl);
  });
}

function renderHistoryChart() {
  const rows    = getFilteredRows();
  const records = rows.slice().reverse();
  const labels  = records.map(r => r.date.slice(5));
  const hasY2   = [...histSelMetrics].some(id => ['steps','jog'].includes(id));
  const hasY    = [...histSelMetrics].some(id => !['steps','jog'].includes(id));
  const datasets = [];
  HIST_METRICS.forEach(m => {
    if (!histSelMetrics.has(m.id)) return;
    const ds = {
      label: m.label+'('+m.unit+')',
      data:  records.map(r => r._empty ? null : (r[m.key]??null)),
      yAxisID: m.axis,
    };
    if (m.type === 'line') {
      Object.assign(ds, {
        type:'line', borderColor:m.color, backgroundColor:m.color+'18',
        pointBackgroundColor:m.color, tension:.35, fill:false,
        pointRadius:4, pointHoverRadius:7, borderWidth:2, spanGaps:true,
      });
    } else {
      Object.assign(ds, {
        type:'bar', backgroundColor:m.color+'bb', borderColor:m.color,
        borderRadius:4, borderWidth:1, borderSkipped:false,
      });
    }
    datasets.push(ds);
  });
  const scales = {
    x: SCALE_X,
    y: {...SCALE_Y, display:hasY, position:'left'},
  };
  if (hasY2) {
    scales.y2 = {...SCALE_Y, display:true, position:'right', grid:{drawOnChartArea:false}};
  }
  const ctx = document.getElementById('histChart').getContext('2d');
  if (histChart) histChart.destroy();
  if (!datasets.length) return;
  histChart = new Chart(ctx, {
    type:'bar',
    data:{labels, datasets},
    options:{
      responsive:true,
      plugins:{
        legend:{display:true, labels:{color:'#8892a4',font:{family:'Outfit',size:11}}},
        tooltip:TOOLTIP_OPTS,
      },
      scales,
    }
  });
}

function toggleHistView() {
  histViewMode = histViewMode==='table' ? 'chart' : 'table';
  const btn       = document.getElementById('histViewBtn');
  const chartArea = document.getElementById('histChartArea');
  const tblWrap   = document.getElementById('histTblWrap');
  if (histViewMode === 'chart') {
    btn.textContent = '📋 表格';
    chartArea.style.display = 'block';
    tblWrap.style.display   = 'none';
    initMetricChecks();
    renderHistoryChart();
  } else {
    btn.textContent = '📊 圖表';
    chartArea.style.display = 'none';
    tblWrap.style.display   = 'block';
    renderHistory();
  }
}

// ─── Export / Import ──────────────────────────────────────

function exportData() {
  const records = getRecords();
  const blob = new Blob([JSON.stringify(records, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '健康全記錄_'+today()+'.json';
  a.click();
  toast('匯出成功！');
}
function importData() { document.getElementById('fileInput').click(); }
function handleImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error();
      if (!confirm('匯入將覆蓋現有 '+getRecords().length+' 筆資料，確定？')) return;
      saveRecords(data); renderAll();
      toast('匯入成功！共 '+data.length+' 筆');
    } catch { toast('檔案格式錯誤', true); }
  };
  reader.readAsText(file); e.target.value='';
}

// ─── Init ─────────────────────────────────────────────────

function renderAll() {
  renderStats();
  renderHistory();
  if (histViewMode==='chart') renderHistoryChart();
}

initDate();
renderAll();
</script>
